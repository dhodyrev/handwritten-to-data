# Phase 1 ablation preset: all toggles on.
# Compare vs configs/pipeline.yaml (Phase 0 baseline) on the same val split.

image:
  deskew: true
  deskew_max_angle_deg: 8.0

postproc:
  nms_iou: 0.5

