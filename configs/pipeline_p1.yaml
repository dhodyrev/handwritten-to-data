    school: 0.05
    university: 0.05
    dictation: 0.04
    archive: 0.02
    default: 0.05
  # Populate after running scripts/mine_fewshot.py (TODO Phase 1.6).
  few_shot_examples: {}

routing:
  math_shortcircuit_min_lines: 3
